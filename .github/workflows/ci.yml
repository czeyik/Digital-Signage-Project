name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip
      - name: Install backend and audit tools
        working-directory: backend
        run: |
          python -m pip install --upgrade pip setuptools==83.0.0
          python -m pip install --editable '.[dev]' pip-audit==2.10.1
      - name: Lint
        working-directory: backend
        run: python -m ruff check --no-cache .
      - name: Django checks and migrations
        working-directory: backend
        run: |
          python manage.py check
          python manage.py makemigrations --check --dry-run
      - name: Tests
        working-directory: backend
        env:
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
          DJANGO_SETTINGS_MODULE: config.settings
        run: python -m pytest -p pytest_django.plugin
      - name: Dependency vulnerability audit
        working-directory: backend
        run: python -m pip_audit --skip-editable

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build verification image
        run: docker build -f android-player/Dockerfile.build -t duducar-android-build android-player
      - name: Android tests and Kotlin compile
        run: >-
          docker run --rm
          -v "$PWD/android-player:/workspace"
          -w /workspace duducar-android-build
          ./gradlew testDebugUnitTest :app:compileDebugKotlin --no-daemon

  terraform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.13.3"
      - run: terraform fmt -check -recursive infrastructure
      - name: Validate bootstrap
        working-directory: infrastructure/bootstrap
        run: terraform init -backend=false && terraform validate
      - name: Validate production stack
        working-directory: infrastructure/terraform
        run: terraform init -backend=false && terraform validate

  container:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build backend image
        run: docker build -t duducar-signage-backend:ci backend
      - name: Scan container
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: duducar-signage-backend:ci
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
