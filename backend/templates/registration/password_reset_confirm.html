{% extends "base.html" %}
{% block content %}
<section class="auth-card"><h1>Choose a new password</h1>
{% if validlink %}<form method="post" class="stack">{% csrf_token %}{{ form.as_p }}<button class="primary">Change password</button></form>
{% else %}<p>This reset link is invalid or has expired.</p>{% endif %}</section>
{% endblock %}
